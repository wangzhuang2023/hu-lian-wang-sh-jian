{% extends 'base.html' %}
{% block content %}
  <h2>最新数据</h2>
  <ul>
    {% for it in items %}
      <li><strong>{{ it['title'] }}</strong>: {{ it['content'] }}</li>
    {% else %}
      <li>暂无数据</li>
    {% endfor %}
  </ul>
  {% if user and user['is_admin'] %}
    <p><a href="{{ url_for('admin_users') }}">管理用户</a></p>
  {% endif %}
{% endblock %}
